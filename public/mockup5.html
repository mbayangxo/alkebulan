<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>BloomBay — City / Happenings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Fraunces:ital,opsz,wght@1,9..144,300;1,9..144,400&family=Jost:wght@300;400;500;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

body {
  width: 390px;
  background: #1C1B1C;
  font-family: 'Jost', sans-serif;
  color: #F6F1EB;
  overflow-x: hidden;
}

/* ── STATUS BAR ── */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px 8px;
}
.status-time {
  font-family: 'Jost', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: white;
}
.status-icons { display: flex; gap: 5px; align-items: center; }

/* ── CITY HERO HEADER ── */
.city-header {
  padding: 8px 22px 0;
}
.city-hero {
  position: relative;
  margin-bottom: 0;
}
.city-headline {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 38px;
  color: white;
  letter-spacing: -0.03em;
  line-height: 0.95;
}
.city-headline em {
  font-style: italic;
  color: #FF1F7D;
}
.city-sub {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 14px;
  color: rgba(246,241,235,0.65);
  margin-top: 8px;
  letter-spacing: 0.01em;
}
.city-meta-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.city-date {
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: rgba(246,241,235,0.55);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.filter-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 100px;
  padding: 6px 14px;
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: white;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* ── MODE PILLS ── */
.mode-pills {
  display: flex;
  gap: 8px;
  padding: 16px 22px;
}
.mode-pill {
  padding: 8px 16px;
  border-radius: 100px;
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(246,241,235,0.6);
}
.mode-pill.active {
  background: #FF1F7D;
  border-color: #FF1F7D;
  color: white;
}

/* ── EVENT FEED ── */
/* LARGE BANNER CARD */
.event-banner {
  margin: 4px 22px 16px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  height: 420px;
}
.event-banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.event-banner-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 50%, transparent 100%);
}
.event-banner-content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 24px;
}
.event-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #FF1F7D;
  color: white;
  font-family: 'Jost', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 4px 10px;
  border-radius: 100px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.event-badge-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: white;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.event-name-large {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  font-weight: 700;
  color: white;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 8px;
}
.event-detail-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
}
.event-detail {
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  color: rgba(255,255,255,0.75);
  font-weight: 400;
  display: flex;
  align-items: center;
  gap: 5px;
}
.event-cta-row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.btn-primary {
  flex: 1;
  background: #FF1F7D;
  color: white;
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 14px;
  border-radius: 100px;
  text-align: center;
}
.btn-ghost {
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* TWO-COLUMN GRID */
.col-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 0 22px 16px;
}
.col-card {
  border-radius: 16px;
  overflow: hidden;
  position: relative;
}
.col-card:last-child { margin-top: 30px; }
.col-card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
}
.col-card-tag {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  color: white;
  font-family: 'Jost', sans-serif;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  padding: 4px 9px;
  border-radius: 100px;
  text-transform: uppercase;
}

/* HORIZONTAL SCROLL ROW */
.scroll-section {
  padding: 0 22px 140px;
}
.scroll-label {
  font-family: 'Jost', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: rgba(246,241,235,0.5);
  text-transform: uppercase;
  margin-bottom: 14px;
}
.h-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 4px;
}
.h-scroll::-webkit-scrollbar { display: none; }
.h-card {
  flex: 0 0 auto;
  width: 154px;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
}
.h-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 390px;
  background: #1C1B1C;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding: 10px 0 28px;
  display: flex;
  justify-content: space-around;
}
.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.nav-pill {
  width: 62px;
  height: 36px;
  border-radius: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-tab.active .nav-pill { background: #FF1F7D; }
.nav-tab-label {
  font-family: 'Jost', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.04em;
}
.nav-tab.active .nav-tab-label { color: #FF1F7D; }
</style>
</head>
<body>

<!-- STATUS BAR -->
<div class="status-bar">
  <span class="status-time">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" viewBox="0 0 16 12" fill="white">
      <rect x="0" y="8" width="2.5" height="4" rx="0.8" opacity="0.4"/>
      <rect x="4" y="5.5" width="2.5" height="6.5" rx="0.8" opacity="0.6"/>

<!-- CITY HEADER -->
<div class="city-header">
  <div class="city-hero">
    <div class="city-headline">Out<br><em>Tonight</em><br>NYC</div>

      Filter

  </div>
</div>

<!-- MODE PILLS -->
<div class="mode-pills">
  <div class="mode-pill active">Out Tonight</div>
  <div class="mode-pill">Neighborhoods</div>

</div>

<!-- FEATURED EVENT BANNER -->
<div class="event-banner">
  <img src="happenings/happenings%20posters/08_Rooftop_Sessions.png" alt="Rooftop Sessions">
  <div class="event-banner-overlay"></div>

    <div class="event-badge">
      <div class="event-badge-dot"></div>
      Tonight · Featured
    </div>

    <div class="event-detail-row">
      <div class="event-detail">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        7PM – Late
      </div>
      <div class="event-detail">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Secret Location, NYC
      </div>
    </div>
    <div class="event-cta-row">
      <div class="btn-primary">I'M IN →</div>
      <div class="btn-ghost">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<!-- 2-COL GRID -->
<div class="col-grid">
  <div class="col-card">
    <div class="col-card-tag">Dance</div>
    <img src="happenings/happenings%20posters/06_Dance_All_Night.png" alt="Dance All Night">
  </div>
  <div class="col-card">
    <div class="col-card-tag">Dinner</div>
    <img src="happenings/happenings%20posters/04_Italian_Dinner_Society.png" alt="Italian Dinner Society">
  </div>
</div>

<!-- MORE EVENTS SCROLL -->
<div class="scroll-section">
  <div class="scroll-label">More This Week</div>
  <div class="h-scroll">
    <div class="h-card">
      <img src="happenings/happenings%20posters/03_Vinyl_Night_Jazz.png" alt="Vinyl Night">
    </div>
    <div class="h-card">
      <img src="happenings/happenings%20posters/07_Sunday_Brunch_Club.png" alt="Brunch Club">
    </div>
    <div class="h-card">
      <img src="happenings/happenings%20posters/09_Bagels_And_Books.png" alt="Bagels & Books">
    </div>
    <div class="h-card">
      <img src="happenings/happenings%20posters/05_Film_Club.png" alt="Film Club">
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-tab">
    <div class="nav-pill">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

      </svg>
    </div>
    <span class="nav-tab-label">City</span>
  </div>
  <div class="nav-tab">
    <div class="nav-pill">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>

</div>

</body>
