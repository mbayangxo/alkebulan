<svg width="480" height="340" viewBox="0 0 480 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Envelope body -->
  <rect x="32" y="60" width="416" height="240" rx="18" fill="#FDF4EC" stroke="#FF0055" stroke-width="6"/>
  <!-- Envelope flap open (top fold) -->
  <path d="M32 78L240 200L448 78" stroke="#FF0055" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom left seam -->
  <path d="M32 300L178 186" stroke="#FF0055" stroke-width="5" stroke-linecap="round"/>
  <!-- Bottom right seam -->
  <path d="M448 300L302 186" stroke="#FF0055" stroke-width="5" stroke-linecap="round"/>

  <!-- Wax seal circle -->
  <circle cx="240" cy="178" r="40" fill="#FFD6E4" stroke="#FF0055" stroke-width="6"/>

  <!-- BB monogram in seal -->
  <text x="240" y="193" text-anchor="middle" font-size="36" font-family="Georgia, serif" fill="#FF0055" font-weight="700">BB</text>

  <!-- Decorative bloom petals above envelope -->
  <path d="M100 52C106 38 118 38 124 52C130 38 142 38 148 52C134 60 114 60 100 52Z" fill="#FF0055"/>
  <path d="M340 44C347 28 361 28 368 44C375 28 389 28 396 44C381 53 355 53 340 44Z" fill="#FF85A8"/>

  <!-- Small heart detail -->
  <path d="M224 222C218 214 206 214 206 224C206 234 224 244 224 244C224 244 242 234 242 224C242 214 230 214 224 222Z" fill="#FF0055" opacity="0.18"/>
</svg>
